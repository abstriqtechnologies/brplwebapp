name: CI

on:
  push:
    branches: [main, "refactor/**"]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    name: Lint, test, build
    runs-on: ubuntu-latest

    env:
      # Minimal env so `next build` and the env-validation pass in CI.
      NODE_ENV: test
      MONGODB_URI: mongodb://localhost:27017/brpl_test
      JWT_SECRET: ci-jwt-secret-do-not-use-in-prod
      RAZORPAY_KEY_ID: rzp_test_placeholder
      RAZORPAY_KEY_SECRET: placeholder_secret
      RAZORPAY_WEBHOOK_SECRET: placeholder_webhook_secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check (build)
        run: npm run build

      - name: Unit tests
        run: npm run test

      # Integration tests are opt-in (they require a live MongoDB).
      # - name: Integration tests
      #   run: npm run test:integration
      #   env:
      #     MONGODB_URI: ${{ secrets.TEST_MONGODB_URI }}
