            - generic [ref=e176]:
              - heading "Beyond Reach Premier League India's Grassroots T10 Cricket League" [level=1] [ref=e177]:
                - text: Beyond Reach Premier League
                - text: India's Grassroots T10 Cricket League
              - paragraph [ref=e178]: "\"BRPL – Bharat ki League, Bharatiyon ka Sapna\""
            - generic [ref=e179]:
              - paragraph [ref=e180]: Beyond Reach Premier League (BRPL) is India's premier T10 tennis-ball cricket league, built to give every aspiring cricketer — regardless of city, background, or contacts — a fair, structured pathway to professional cricket. Through nationwide cricket trials and open player registration across five zones, BRPL is rewriting how talent is discovered in Indian cricket.
              - paragraph [ref=e181]: What makes BRPL different is its commitment to grassroots access. Whether you're playing gully cricket in a small town or representing your district side, BRPL's zonal trials are designed to surface raw talent that conventional scouting overlooks. Selected players join franchise teams, compete in a fast-paced T10 format, and gain real exposure to scouts, mentors, and live broadcasts.
              - paragraph [ref=e182]: Player benefits include professional coaching, performance tracking, prize money, and scouting exposure — a genuine shot at a long-term cricketing career. Every selected player represents their zone, wears their colours, and plays for a chance to inspire the next generation back home.
            - link "Register for Trials" [ref=e184] [cursor=pointer]:
              - /url: /login
