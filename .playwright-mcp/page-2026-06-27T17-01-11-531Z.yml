          - heading "About BRPL" [level=2] [ref=e73]
          - generic [ref=e74]:
            - paragraph [ref=e75]: What comes to mind when you think about cricket? It's usually high-stakes matches, world-class players, big stadiums, etc. The cricket dream has become so big, it seems unachievable by the common man. But if one has the passion and the skill, why shouldn't they have a platform?
            - paragraph [ref=e76]: This is what we want to change with the Beyond Reach Premier League (BRPL). We bring you a fresh T10 tennis ball cricket league format league that will transform how cricket is played and experienced. With nationwide trials in place, expect to see raw talent from every corner of the country. Guided by the vision "Bharat ki League, Bhartiyo ka Sapna," we have a strong focus on inclusivity, community, sustainability, and, of course, the entertainment factor.
            - paragraph [ref=e77]: Our management team has experience in major tournaments like the IPL and the ICC World Cup, and they will leave no stone unturned to make BRPL the biggest cricket event in the country. So when it comes to us, expect the unexpected. With six talented teams, thrilling double-header matches, and unique X-Factor Rules, you are in for a treat.
      - generic [ref=e81]:
        - generic [ref=e82]:
